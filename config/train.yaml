# Environment
dt: 0.1
max_episode_steps: 2048

# Model
model:
  path: checkpoints
  mode: train

  space:
    n_actions: 5
    features: 8

  optimization:
    gamma: 0.997
    actor_lr: 0.0003
    critic_lr: 0.0003
    gae_lambda: 0.95
    policy_clip: 0.2
    val_loss_coef: 0.5
    entropy_coef: 0.01

  sampling:
    total_timesteps: 500_000
    rollout_steps: 1024
    mini_batch_size: 128
    n_epochs: 8

# Drone configuration
drone:

  small:
    count: 1
    view_range: 200
    disturbance_mult: 0.8 # [0,1]
    min_speed: 0
    max_speed: 6
    ver_angle: 90
    hor_angle: 140
    max_cam_rot: 90
    spawn_dist: [30, 80]
    view_dir: [1, 0, -0.7]
    max_altitude: 150

  large:
    count: 1
    view_range: 400
    disturbance_mult: 1.0 # [0,1]
    min_speed: 0
    max_speed: 8
    ver_angle: 90
    hor_angle: 140
    max_cam_rot: 90
    spawn_dist: [40, 100]
    view_dir: [1, 0, -0.7]
    max_altitude: 150

# Animal configuration
animal:
  env:
    count: 2

  init:
    min_speed: 0
    max_speed: 6
    behavior: CRW_CFG        # mapped -> POI_CFG()
    movement_dim: TWO_D  # mapped -> MovementDim.TWO_D
    max_spawn_radius: 200

# Disturbance model
max_angle_boost: 1   # how much can angle add to disturbance at most, 1 -> can at most double the disturbance up to 1, keep in [0, 1] !
max_heading_boost: 1 # how much can heading add to disturbance at most, 1 -> can at most double the disturbance up to 1 , keep in [0, 1] !

# Resource model
resource:
  p_wavelenght: 200
  p_reduction: 0.2
  p_scale: 0.4
  sample_res: 5
  kernel_size: 250
  min_poi_p: 1.0e-2