# Environment
dt: 0.1
max_episode_steps: 2048
behavior_cfg: config

# Model
model:
  path: checkpoints
  mode: train
  actor_type: standard

  space:
    n_actions: 5
    drone_features: 4
    animal_features: 8
    other_drone_features: 0
    action_type: rel   # [rel, abs]

  optimization:
    gamma: 0.99
    actor_lr: 0.0003
    tau: 0.005                 # soft target updates; remove if you want hard-copy updates
    target_update_interval: 16384
    eps_start: 1.0
    eps_end: 0.05
    eps_decay_steps: 300000

  replay:
    buffer_size: 200000
    batch_size: 256
    learn_after: 10000
    learn_every: 10
    gradient_steps: 1

  sampling:
    total_timesteps: 2_000_000
    rollout_steps: 1
    mini_batch_size: 256
    n_epochs: 1

  discrete:
    forward_bins: [-1, -0.5, 0, 0.5, 1]
    right_bins:   [-1, -0.5, 0, 0.5, 1]
    up_bins:      [-1, -0.5, 0, 0.5, 1]
    speed_bins:   [0, 0.05, 0.10, 0.15, 0.20, 0.50, 1]
    theta_bins:   [-1, -0.5, -0.25, 0, 0.25, 0.5, 1]

drone:
  large:
    count: 1
    disturbance_mult: 1.0
    hor_angle: 140
    ver_angle: 90
    view_range: 200
    max_cam_rot: 90
    min_speed: 0
    max_speed: 25
    max_altitude: 150
    spawn_dist: [70, 90]
    view_dir: [1, 0, -0.7]

# Animal configuration
animal:
  env:
    count: 1

  init:
    min_speed: 0
    max_speed: 12
    behavior: CRW_CFG
    movement_dim: TWO_D
    max_spawn_radius: 200

# Disturbance model
max_angle_activation: 0.2
max_heading_activation: 0.2
max_axis_activation: 0.2

# Reward
disturbance_penalty_scale: 0.3
p_vel_scale: 0.01
p_theta_scale: 0.01
p_dir_change_scale: 0.02

# Termination / visibility recovery
track_loss_grace: 50
not_visible_penalty: 0.1

# Resource model
resource:
  p_wavelenght: 200
  p_reduction: 0.2
  p_scale: 0.4
  sample_res: 5
  kernel_size: 250
  min_poi_p: 1.0e-2